{% extends "base.html" %}
{% block content %}
<canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></canvas>

<div class="container py-5 d-flex justify-content-center align-items-center" style="min-height: 85vh; overflow: hidden;">
    
    <div class="ps-gift-wrapper animate__animated animate__zoomIn">
        
        <div class="ps-gift-ribbon"></div>

        <div class="card-body p-4 p-md-5 text-center bg-white shadow-lg" style="border-radius: 0 0 30px 30px;">
            <div class="ps-reveal-icon mb-4">
                <div class="ps-icon-circle">
                    <i class="fa-solid fa-gift"></i>
                </div>
            </div>

            <h1 class="ps-celebration-text">Success!</h1>
            <h4 class="fw-bold text-dark mb-2">Order Confirmed</h4>
            <p class="text-muted mb-4 px-lg-4 small">Thank you for choosing <b>Ponno Sebaa</b>. We’ve received your order and our team is already preparing your package with care.</p>

            <div class="ps-order-id-box my-4">
                <div class="ps-dash-border">
                    <span class="ps-label-gold">Tracking Reference</span>
                    <div class="d-flex align-items-center justify-content-center mt-2">
                        <h2 class="fw-black text-teal m-0" id="orderIdText" style="letter-spacing: 3px;">{{ order_id }}</h2>
                        <button class="btn btn-link text-teal ms-2 p-0 shadow-none" onclick="copyId(this)">
                            <i class="fa-regular fa-copy fs-4"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-3">
                <a href="/track?order_id={{ order_id }}" class="btn ps-btn-reveal py-3 rounded-pill shadow">
                    <i class="fa-solid fa-truck-fast me-2"></i> TRACK SHIPMENT
                </a>
                <a href="/" class="btn btn-link text-decoration-none text-teal fw-bold small">
                    Continue Shopping <i class="fa-solid fa-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --ps-teal: #1c6b6b;
        --ps-green-grad: linear-gradient(135deg, #1c6b6b 0%, #2e8b57 100%);
        --ps-gold: #d4a044;
        --ps-dark: #0d2b2b;
    }

    .text-teal { color: var(--ps-teal); }

    .ps-gift-wrapper {
        width: 100%;
        max-width: 480px;
        position: relative;
        background: white;
        border-radius: 30px;
        z-index: 10;
        box-shadow: 0 25px 50px rgba(0,0,0,0.1);
    }

    /* Ribbon Styling */
    .ps-gift-ribbon {
        height: 12px;
        background: var(--ps-green-grad);
        width: 100%;
        border-radius: 30px 30px 0 0;
        position: relative;
    }
    .ps-gift-ribbon::after {
        content: '\f06c'; /* Leaf Icon */
        font-family: 'Font Awesome 6 Free';
        font-weight: 900;
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--ps-gold);
        color: white;
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        font-size: 1.4rem;
        box-shadow: 0 8px 15px rgba(212, 160, 68, 0.3);
    }

    .ps-celebration-text {
        font-family: 'Inter', sans-serif;
        font-weight: 900;
        background: var(--ps-green-grad);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 3.5rem;
        margin-bottom: 0;
    }

    .ps-icon-circle {
        width: 80px;
        height: 80px;
        background: var(--ps-soft-bg);
        color: var(--ps-gold);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        font-size: 2.5rem;
        animation: pulseGift 2s infinite ease-in-out;
    }

    @keyframes pulseGift {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 160, 68, 0.4); }
        70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(212, 160, 68, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 160, 68, 0); }
    }

    .ps-order-id-box {
        background: #f9fbfb;
        padding: 15px;
        border-radius: 20px;
    }
    .ps-dash-border {
        border: 2px dashed #d1dbdb;
        padding: 20px;
        border-radius: 15px;
    }
    .ps-label-gold {
        font-size: 0.7rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--ps-gold);
        letter-spacing: 1.5px;
    }

    .ps-btn-reveal {
        background: var(--ps-green-grad);
        color: white;
        font-weight: 700;
        border: none;
        letter-spacing: 1px;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .ps-btn-reveal:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(28, 107, 107, 0.3);
        color: white;
        filter: brightness(1.1);
    }

    .fw-black { font-weight: 900; }
</style>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    window.onload = function() {
        var duration = 4 * 1000;
        var end = Date.now() + duration;

        (function frame() {
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#1c6b6b', '#2e8b57', '#d4a044']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#1c6b6b', '#2e8b57', '#d4a044']
            });

            if (Date.now() < end) {
                requestAnimationFrame(frame);
            }
        }());
    };

    function copyId(btn) {
        const id = document.getElementById('orderIdText').innerText;
        navigator.clipboard.writeText(id).then(() => {
            btn.innerHTML = '<i class="fa-solid fa-check text-success fs-4"></i>';
            setTimeout(() => { btn.innerHTML = '<i class="fa-regular fa-copy fs-4"></i>'; }, 2000);
        });
    }
</script>
{% endblock %}
